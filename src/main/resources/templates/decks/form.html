<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Deck - MTG Deck Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Créer un Nouveau Deck</h1>
            <nav>
                <a th:href="@{/}">Accueil</a> |
                <a th:href="@{/cards}">Cartes</a> |
                <a th:href="@{/decks}">Mes Decks</a>
            </nav>
        </header>

        <main>
            <form th:action="@{/decks/new}" th:object="${deck}" method="post" class="deck-form">
                <div class="form-group">
                    <label for="name">Nom du deck *</label>
                    <input type="text" id="name" th:field="*{name}"
                           class="form-control"
                           placeholder="Ex: Deck Rouge/Vert Aggro">
                    <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}"
                              class="form-control" rows="4"
                              placeholder="Description de votre stratégie..."></textarea>
                    <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Créer le deck</button>
                    <a th:href="@{/decks}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>

            <div class="info-box">
                <p>
                    <strong>Note :</strong> Après la création, vous pourrez ajouter des cartes à votre deck
                    via le Deck Builder. Un deck valide doit contenir exactement 30 cartes.
                </p>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 - Gestionnaire de Decks MTG</p>
        </footer>
    </div>
</body>
</html>
