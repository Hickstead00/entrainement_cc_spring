<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Cartes - MTG Deck Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎴 Collection de Cartes</h1>
            <nav>
                <a th:href="@{/}">Accueil</a> |
                <a th:href="@{/cards}">Cartes</a> |
                <a th:href="@{/decks}">Mes Decks</a>
            </nav>
        </header>

        <main>
            <!-- Barre de recherche -->
            <div class="search-box">
                <form th:action="@{/cards}" method="get">
                    <input type="text" name="search" th:value="${search}"
                           placeholder="Rechercher une carte...">
                    <button type="submit" class="btn btn-primary">Rechercher</button>
                    <a th:href="@{/cards}" class="btn btn-secondary">Réinitialiser</a>
                </form>
            </div>

            <p class="card-count">
                <strong th:text="${#lists.size(cards)}">0</strong> carte(s) trouvée(s)
            </p>

            <!-- Liste des cartes -->
            <div class="card-grid">
                <div class="card-item" th:each="card : ${cards}">
                    <div class="card-header" th:classappend="${card.rarity.name().toLowerCase()}">
                        <h3 th:text="${card.name}">Nom de la carte</h3>
                        <span class="mana-cost" th:text="${card.manaCost}"></span>
                    </div>

                    <div class="card-body">
                        <p class="card-type" th:text="${card.fullType}">Type - Sous-type</p>

                        <div class="card-colors">
                            <span th:each="color : ${card.colors}"
                                  class="color-badge"
                                  th:style="'background-color:' + ${color.hexColor}"
                                  th:text="${color.symbol}">W</span>
                        </div>

                        <p class="card-text" th:text="${card.rulesText}">Texte de règles</p>

                        <div th:if="${card.creature}" class="creature-stats">
                            <strong>Force/Endurance :</strong>
                            <span th:text="${card.stats}">0/0</span>
                        </div>

                        <span class="rarity-badge" th:text="${card.rarity.displayName}">Commune</span>
                    </div>

                    <div class="card-footer">
                        <a th:href="@{/cards/{id}(id=${card.id})}" class="btn btn-sm">Détails</a>
                    </div>
                </div>
            </div>

            <!-- Message si aucune carte -->
            <div th:if="${#lists.isEmpty(cards)}" class="no-results">
                <p>Aucune carte trouvée.</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 - Gestionnaire de Decks MTG</p>
        </footer>
    </div>
</body>
</html>
